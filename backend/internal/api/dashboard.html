<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RoomPulse</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="theme-color" content="#0A0F1F">
<meta name="color-scheme" content="dark">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0A0F1F; --ink-2: #0C1428;
    --panel: #111A33; --panel-2: #16203C; --raised: #1C2747;
    --line: rgba(150,170,220,.12); --line-soft: rgba(150,170,220,.07);
    --text: #EAEEFB; --muted: #818DB4; --faint: #5C668A;
    --signal: #2FE6B0; --signal-dim: rgba(47,230,176,.14); --signal-line: rgba(47,230,176,.4);
    --amber: #F4B740; --amber-dim: rgba(244,183,64,.14);
    --open-text: #C7D0EA; --open-line: rgba(176,190,224,.30);
    --accent: #2FE6B0; --accent-dim: rgba(47,230,176,.16);
    --danger: #FF6B6B;
    --r: 14px;
    --f-display: "Space Grotesk", system-ui, sans-serif;
    --f-body: "IBM Plex Sans", system-ui, sans-serif;
    --f-mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; color: var(--text); font-family: var(--f-body); font-size: 14px; line-height: 1.55;
    background:
      radial-gradient(900px 500px at 82% -8%, rgba(47,230,176,.10), transparent 60%),
      radial-gradient(800px 520px at 10% 0%, rgba(47,230,176,.06), transparent 55%),
      linear-gradient(180deg, var(--ink-2), var(--ink) 38%);
    background-attachment: fixed; min-height: 100vh;
  }
  ::selection { background: var(--signal-dim); }
  a { color: var(--accent); }

  /* ---- shared header (identical on dashboard + floor) ---- */
  header {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 13px 22px; border-bottom: 1px solid var(--line);
    background: rgba(10,15,31,.72); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  }
  .brand { display: flex; align-items: center; gap: 11px; text-decoration: none; color: inherit; }
  .beacon { position: relative; width: 11px; height: 11px; flex: none; }
  .beacon i { position: absolute; inset: 0; margin: auto; width: 9px; height: 9px; border-radius: 50%;
    background: #2FE6B0; box-shadow: 0 0 12px #2FE6B0; }
  .beacon::before, .beacon::after { content: ""; position: absolute; inset: -2px; border-radius: 50%;
    border: 1.5px solid #2FE6B0; opacity: 0; animation: ping 2.6s cubic-bezier(.2,.6,.3,1) infinite; }
  .beacon::after { animation-delay: 1.3s; }
  @keyframes ping { 0% { transform: scale(.7); opacity: .7; } 80%,100% { transform: scale(2.6); opacity: 0; } }
  .brand h1 { font-family: var(--f-display); font-size: 18px; font-weight: 700; letter-spacing: .2px; margin: 0; }
  .brand h1 b { color: #2FE6B0; }
  .brand .tag { font-size: 11px; color: var(--muted); margin-top: 1px; letter-spacing: .2px; }
  .seg { display: flex; gap: 3px; padding: 3px; border: 1px solid var(--line); border-radius: 999px; background: rgba(150,170,220,.06); }
  .seg a { font-family: var(--f-mono); font-size: 12px; text-decoration: none; color: var(--muted); padding: 7px 14px; border-radius: 999px; white-space: nowrap; transition: color .15s, background .15s; }
  .seg a.on { background: rgba(47,230,176,.14); color: #2FE6B0; }
  .seg a:hover:not(.on) { color: var(--text); }
  .right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .chip { font-family: var(--f-mono); font-size: 11px; color: var(--muted);
    border: 1px solid var(--line); border-radius: 999px; padding: 5px 11px; display: inline-flex; gap: 6px; align-items: center; }
  .chip .led { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); }
  .chip.live .led { background: #2FE6B0; box-shadow: 0 0 8px #2FE6B0; }
  .chip.down { color: var(--amber); border-color: rgba(244,183,64,.4); }
  .chip.down .led { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  button { font-family: var(--f-body); font-size: 13px; font-weight: 500; cursor: pointer;
    border-radius: 9px; padding: 8px 14px; border: 1px solid transparent; transition: transform .06s, background .15s, border-color .15s; }
  button:active { transform: translateY(1px); }
  .btn-primary { background: var(--accent); color: #0a0f1f; font-weight: 600; }
  .btn-primary:hover { background: #5FF0C6; }
  .btn-ghost { background: transparent; color: var(--text); border-color: var(--line); }
  .btn-ghost:hover { border-color: var(--accent); color: #fff; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---- layout ---- */
  main { padding: 26px 24px 60px; max-width: 1180px; margin: 0 auto; }
  .eyebrow { font-family: var(--f-mono); font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 2px; color: var(--signal); display: flex; align-items: baseline; gap: 10px; margin: 0 2px 13px; }
  .eyebrow .n { color: var(--faint); }
  .block { margin-bottom: 34px; }

  /* ---- vitals ---- */
  .vitals { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 34px; }
  .vital { position: relative; overflow: hidden; background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line); border-radius: var(--r); padding: 16px 18px; }
  .vital .k { font-family: var(--f-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); }
  .vital .v { font-family: var(--f-display); font-size: 38px; font-weight: 600; line-height: 1.05; margin-top: 8px;
    font-variant-numeric: tabular-nums; letter-spacing: -.5px; }
  .vital .sub { font-size: 12px; color: var(--faint); margin-top: 3px; }
  .vital.hero { border-color: var(--signal-line); }
  .vital.hero .v { color: var(--signal); }
  .vital.hero::after { content: ""; position: absolute; right: -40px; top: -40px; width: 130px; height: 130px;
    background: radial-gradient(circle, var(--signal-dim), transparent 70%); pointer-events: none; }

  /* ---- occupancy grid ---- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(258px, 1fr)); gap: 14px; }
  .room { position: relative; background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line); border-radius: var(--r); padding: 16px 17px 14px; }
  .room.busy { border-color: var(--signal-line); }
  .room.booked { border-left: 2px solid var(--amber); }
  .room.empty { opacity: .72; border-left: 2px solid var(--open-line); }
  .room.busy::after { content: ""; position: absolute; inset: -1px; border-radius: inherit; pointer-events: none;
    border: 1px solid var(--signal); opacity: 0; animation: pulse 2.8s ease-out infinite; }
  @keyframes pulse { 0% { opacity: .55; } 70%,100% { opacity: 0; } }
  .room .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .room .name { font-family: var(--f-display); font-weight: 600; font-size: 16px; }
  .room .loc { font-size: 11.5px; color: var(--faint); margin-top: 2px; }
  .room .cap { font-family: var(--f-mono); font-size: 12px; color: var(--muted); white-space: nowrap; }
  .room .state { display: flex; align-items: center; gap: 7px; margin: 13px 0 4px; font-size: 13px; font-weight: 600; }
  .room .state .ico { width: 15px; height: 15px; flex: none; display: inline-flex; }
  .room .state .ico svg { width: 100%; height: 100%; }
  .room.busy .state { color: var(--signal); }
  .room.booked .state { color: var(--amber); }
  .room.empty .state { color: var(--muted); }
  .room .pill { display: inline-flex; align-items: center; gap: 4px; margin-left: auto; font-family: var(--f-mono);
    font-weight: 600; font-size: 13px; font-variant-numeric: tabular-nums; background: var(--signal); color: #06231B;
    padding: 2px 10px; border-radius: 999px; box-shadow: 0 0 10px rgba(47,230,176,.45); }
  .room .pill svg { width: 13px; height: 13px; }
  .room .who { font-size: 12.5px; color: var(--text); min-height: 17px; }
  .room .booked-t { font-size: 12px; color: var(--amber); margin-top: 2px; }
  .vital .bar { height: 4px; border-radius: 2px; background: rgba(124,140,170,.18); margin-top: 10px; overflow: hidden; }
  .vital .bar i { display: block; height: 100%; background: var(--signal); border-radius: 2px; transition: width .4s ease; }

  /* ---- tables ---- */
  .card { background: linear-gradient(180deg, var(--panel-2), var(--panel)); border: 1px solid var(--line);
    border-radius: var(--r); overflow: hidden; }
  .scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 460px; }
  th, td { text-align: left; padding: 12px 18px; border-bottom: 1px solid var(--line-soft); white-space: nowrap; }
  th { font-family: var(--f-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); font-weight: 500; background: rgba(255,255,255,.012); }
  tbody tr:last-child td { border-bottom: 0; }
  tbody tr { transition: background .12s; }
  tbody tr:hover { background: rgba(47,230,176,.05); }
  td.num { font-family: var(--f-mono); font-variant-numeric: tabular-nums; }
  .mono { font-family: var(--f-mono); font-size: 12px; color: var(--muted); }
  .mono.id { color: var(--text); }
  tr.stale td { opacity: .45; }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600;
    font-family: var(--f-mono); border: 1px solid transparent; letter-spacing: .2px; }
  .b-signal { background: var(--signal-dim); color: var(--signal); border-color: var(--signal-line); }
  .b-amber { background: var(--amber-dim); color: var(--amber); border-color: rgba(244,183,64,.4); }
  .b-muted { background: rgba(129,141,180,.12); color: var(--muted); border-color: var(--line); }

  .empty { padding: 26px 18px; color: var(--muted); font-size: 13px; text-align: center; }
  .empty b { display: block; color: var(--text); font-weight: 600; margin-bottom: 3px; font-family: var(--f-display); }

  /* ---- advanced / diagnostics disclosure ---- */
  .advanced { border-top: 1px solid var(--line); margin-top: 8px; }
  .advanced > summary { cursor: pointer; list-style: none; font-family: var(--f-mono); font-size: 11px;
    text-transform: uppercase; letter-spacing: 1.6px; color: var(--muted); padding: 16px 2px; display: flex; align-items: center; gap: 9px; }
  .advanced > summary::-webkit-details-marker { display: none; }
  .advanced > summary::before { content: "›"; display: inline-block; transition: transform .2s; font-size: 14px; }
  .advanced[open] > summary::before { transform: rotate(90deg); }
  .advanced > summary:hover { color: var(--text); }
  .adv-body { padding-top: 6px; }
  .adv-row { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }

  footer { text-align: center; color: var(--faint); font-size: 11.5px; font-family: var(--f-mono); padding: 8px 0 0; }

  @media (max-width: 860px) { .vitals { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) {
    main { padding: 20px 14px 48px; } header { padding: 12px 14px; }
    .brand .tag { display: none; }
  }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; } }
</style>
</head>
<body>
<header>
  <a class="brand" href="/">
    <span class="beacon"><i></i></span>
    <div><h1>Room<b>Pulse</b></h1><div class="tag">Apple Developer Academy · Bali</div></div>
  </a>
  <nav class="seg">
    <a href="/" class="on" aria-current="page">Dashboard</a>
    <a href="/floor">Floor plan</a>
    <a href="/how">How it works</a>
  </nav>
  <div class="right">
    <span class="chip" id="conn"><span class="led"></span><span id="conn-text">connecting…</span></span>
  </div>
</header>

<main>
  <section class="vitals" id="vitals" aria-label="Live vitals"></section>

  <section class="block">
    <div class="eyebrow">Live occupancy <span class="n" id="occ-count"></span></div>
    <div id="occupancy" class="grid"></div>
  </section>

  <section class="block">
    <div class="eyebrow">Reservations <span class="n">today</span></div>
    <div class="card"><div class="scroll" id="reservations"></div></div>
  </section>

  <details class="advanced">
    <summary>Advanced · diagnostics</summary>
    <div class="adv-body">
      <div class="adv-row">
        <span class="chip" id="mode">mode —</span>
        <button class="btn-ghost" onclick="sync()" id="syncBtn">Sync from Zoom</button>
      </div>
      <section class="block">
        <div class="eyebrow">Devices <span class="n">phones reporting presence</span></div>
        <div class="card"><div class="scroll" id="devices"></div></div>
      </section>
      <section class="block">
        <div class="eyebrow">Beacons <span class="n">iBeacon identity per room</span></div>
        <div class="card"><div class="scroll" id="beacons"></div></div>
      </section>
    </div>
  </details>

  <footer id="updated">—</footer>
</main>

<script>
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function fmtTime(s) {
  if (!s) return "—";
  return new Date(s).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}
function fmtAgo(sec) {
  if (sec == null) return "—";
  if (sec < 60) return sec + "s ago";
  if (sec < 3600) return Math.floor(sec / 60) + "m ago";
  return Math.floor(sec / 3600) + "h ago";
}
function checkBadge(status) {
  if (status === "checked_in") return '<span class="badge b-signal">checked in</span>';
  if (status === "checked_out") return '<span class="badge b-muted">checked out</span>';
  return '<span class="badge b-amber">awaiting</span>';
}
function roomName(rooms, wsId) {
  const r = rooms.find(x => x.zoom_workspace_id === wsId);
  return r ? r.name : wsId;
}
function setConn(ok) {
  const c = document.getElementById("conn");
  c.className = "chip " + (ok ? "live" : "down");
  document.getElementById("conn-text").textContent = ok ? "Live" : "Reconnecting…";
}

const ICON_PERSON = '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="3.4"/><path d="M5.5 20c0-3.6 2.9-6 6.5-6s6.5 2.4 6.5 6z"/></svg>';
const ICON_CLOCK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3 1.8"/></svg>';
const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 12.5l2.4 2.4 4.6-5"/></svg>';

const STALE_SEC = 120;
let lastUpdate = Date.now();

async function refresh() {
  let res, rooms, occ, dev, beac;
  try {
    [res, rooms, occ, dev, beac] = await Promise.all([
      fetch("/reservations").then(r => r.json()),
      fetch("/rooms").then(r => r.json()),
      fetch("/occupancy").then(r => r.json()),
      fetch("/devices").then(r => r.json()),
      fetch("/beacons").then(r => r.json()),
    ]);
  } catch (e) { setConn(false); return; }
  setConn(true);

  const roomList = rooms.rooms || [];
  const reservations = res.reservations || [];
  const devices = dev.devices || [];
  const beacons = beac.beacons || [];
  const occByWs = {};
  (occ.occupancy || []).forEach(o => { occByWs[o.workspace_id] = o; });

  const present = roomList.reduce((n, r) => n + ((occByWs[r.zoom_workspace_id] || {}).count || 0), 0);
  const occupied = roomList.filter(r => ((occByWs[r.zoom_workspace_id] || {}).count || 0) > 0).length;
  const activeDev = devices.filter(d => d.last_seen_sec <= STALE_SEC).length;

  // ---- vitals ----
  const vital = (k, v, sub, hero) => `<div class="vital${hero ? " hero" : ""}">
    <div class="k">${k}</div><div class="v">${v}</div><div class="sub">${sub}</div></div>`;
  const occPct = roomList.length ? Math.round(occupied / roomList.length * 100) : 0;
  document.getElementById("vitals").innerHTML =
    vital("People present", present, present === 1 ? "1 person in a room" : "across all rooms", true) +
    vital("Rooms occupied", `${occupied}<span style="color:var(--faint);font-size:22px">/${roomList.length}</span>`,
      `<div class="bar"><i style="width:${occPct}%"></i></div>`) +
    vital("Active devices", activeDev, `${devices.length} known · ${devices.length - activeDev} idle`) +
    vital("Rooms", roomList.length, `${beacons.length} beacons mapped`);

  // ---- occupancy: classify, then sort occupied -> booked -> empty ----
  document.getElementById("occ-count").textContent = present ? `${present} present` : "all rooms quiet";
  const cards = roomList.map(r => {
    const ws = r.zoom_workspace_id;
    const o = occByWs[ws] || {};
    const count = o.count || 0;
    const booked = reservations.find(v => v.zoom_workspace_id === ws && v.check_in_status === "not_checked_in");
    const rank = count > 0 ? 0 : (booked ? 1 : 2);
    return { r, ws, count, users: o.users || [], booked, rank };
  });
  cards.sort((a, b) => a.rank - b.rank || b.count - a.count || a.r.name.localeCompare(b.r.name));
  document.getElementById("occupancy").innerHTML = cards.length ? cards.map(c => {
    const r = c.r;
    const cap = r.capacity ? `${c.count}/${r.capacity}` : `${c.count}`;
    const loc = [r.floor, r.has_tv ? "Zoom Room" : null].filter(Boolean).join(" · ") || "Reservation-only";
    const top = `<div class="top"><div><div class="name">${esc(r.name)}</div><div class="loc">${esc(loc)}</div></div>
      <span class="cap">${cap}</span></div>`;
    if (c.count > 0) {
      const booker = reservations.find(v => v.zoom_workspace_id === c.ws && v.check_in_status === "checked_in");
      const names = c.users.map(u => esc(booker && u === booker.user_id ? (booker.user_email || u) : u)).join(", ");
      return `<div class="room busy">${top}
        <div class="state"><span class="ico">${ICON_PERSON}</span>In use<span class="pill">${ICON_PERSON}${c.count}</span></div>
        <div class="who">${names}</div></div>`;
    }
    if (c.booked) {
      return `<div class="room booked">${top}
        <div class="state"><span class="ico">${ICON_CLOCK}</span>Booked</div>
        <div class="booked-t">${fmtTime(c.booked.start_time)}–${fmtTime(c.booked.end_time)} · awaiting check-in</div></div>`;
    }
    return `<div class="room empty">${top}
      <div class="state"><span class="ico">${ICON_CHECK}</span>Available</div></div>`;
  }).join("") : `<div class="card"><div class="empty"><b>No rooms yet</b>Sync from Zoom to load your workspaces.</div></div>`;

  // ---- devices ----
  document.getElementById("devices").innerHTML = devices.length ? `
    <table><thead><tr><th>Device</th><th>Name</th><th>Room</th><th>Last seen</th></tr></thead><tbody>
    ${devices.map(d => {
      const room = d.workspace_id
        ? `<span class="badge b-signal">${esc(roomName(roomList, d.workspace_id))}</span>`
        : '<span class="badge b-muted">no room</span>';
      return `<tr class="${d.last_seen_sec > STALE_SEC ? "stale" : ""}">
        <td class="mono id">${esc(d.device_id)}</td><td>${esc(d.display_name || "—")}</td>
        <td>${room}</td><td class="mono">${fmtAgo(d.last_seen_sec)}</td></tr>`;
    }).join("")}</tbody></table>`
    : `<div class="empty"><b>No phones yet</b>Open RoomPulse on a phone and turn on auto check-in — it'll appear here within seconds.</div>`;

  // ---- beacons ----
  document.getElementById("beacons").innerHTML = beacons.length ? `
    <table><thead><tr><th>Room</th><th>Workspace</th><th>UUID</th><th>Major</th><th>Minor</th></tr></thead><tbody>
    ${beacons.map(b => `<tr>
      <td>${esc(b.name || roomName(roomList, b.workspace_id))}</td>
      <td class="mono id">${esc(b.workspace_id)}</td>
      <td class="mono">${esc(b.uuid)}</td>
      <td class="num">${b.major}</td><td class="num">${b.minor}</td></tr>`).join("")}
    </tbody></table>`
    : `<div class="empty"><b>No beacons registered</b>Add a BEACONS_FILE or use the built-in defaults.</div>`;

  // ---- reservations ----
  document.getElementById("reservations").innerHTML = reservations.length ? `
    <table><thead><tr><th>Room</th><th>Booked by</th><th>Start</th><th>End</th><th>Check-in</th></tr></thead><tbody>
    ${reservations.map(v => `<tr>
      <td>${esc(roomName(roomList, v.zoom_workspace_id))}</td>
      <td>${esc(v.user_email || v.user_id || "—")}</td>
      <td class="mono">${fmtTime(v.start_time)}</td><td class="mono">${fmtTime(v.end_time)}</td>
      <td>${checkBadge(v.check_in_status)}</td></tr>`).join("")}
    </tbody></table>`
    : `<div class="empty"><b>No reservations</b>Nothing booked in the current window.</div>`;

  lastUpdate = Date.now();
}

function tickUpdated() {
  const s = Math.round((Date.now() - lastUpdate) / 1000);
  document.getElementById("updated").textContent = "updated " + (s < 60 ? s + "s ago" : Math.floor(s / 60) + "m ago");
}

async function sync() {
  const b = document.getElementById("syncBtn");
  b.disabled = true; b.textContent = "Syncing…";
  try { await fetch("/sync", { method: "POST" }); } catch (e) {}
  b.disabled = false; b.textContent = "Sync from Zoom";
  refresh();
}

async function loadMode() {
  try {
    const m = await fetch("/info").then(r => r.json());
    document.getElementById("mode").textContent = "mode " + m.zoom_mode;
  } catch (e) {}
}

loadMode();
refresh();
setInterval(refresh, 3000);
setInterval(tickUpdated, 1000);
</script>
</body>
</html>
