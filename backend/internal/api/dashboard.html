<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RoomPulse</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #e6edf3;
    --muted: #8b949e; --accent: #2f81f7; --green: #2ea043; --amber: #d29922; --red: #da3633;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header { display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px; border-bottom: 1px solid var(--border); }
  h1 { font-size: 18px; margin: 0; letter-spacing: .3px; }
  h1 span { color: var(--accent); }
  .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  main { padding: 24px 28px; max-width: 1100px; margin: 0 auto; }
  .row { display: flex; gap: 12px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
  button { background: var(--accent); color: #fff; border: 0; border-radius: 6px;
    padding: 8px 14px; font-size: 13px; cursor: pointer; }
  button.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  button:active { transform: translateY(1px); }
  button.sim { padding: 4px 10px; font-size: 12px; margin-right: 6px; background: var(--green); }
  button.sim.ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .meta { color: var(--muted); font-size: 12px; }
  section { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 22px; overflow: hidden; }
  section h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .6px;
    color: var(--muted); margin: 0; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 11px 18px; border-bottom: 1px solid var(--border); }
  th { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  tr:last-child td { border-bottom: 0; }
  .badge { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11px;
    font-weight: 600; border: 1px solid transparent; }
  .b-green { background: rgba(46,160,67,.15); color: #3fb950; border-color: rgba(46,160,67,.4); }
  .b-amber { background: rgba(210,153,34,.15); color: #d29922; border-color: rgba(210,153,34,.4); }
  .b-muted { background: rgba(139,148,158,.12); color: var(--muted); border-color: var(--border); }
  .tv { font-size: 12px; color: var(--muted); }
  .empty { padding: 20px 18px; color: var(--muted); font-size: 13px; }
  .occgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; padding: 16px 18px; }
  .occ { border: 1px solid var(--border); border-radius: 10px; padding: 14px; background: #0f141b; }
  .occ.busy { border-color: rgba(46,160,67,.5); background: rgba(46,160,67,.06); }
  .occ .rn { font-weight: 600; font-size: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; }
  .occ .cap { color: var(--muted); font-weight: 400; font-size: 12px; }
  .occ .who { font-size: 13px; }
  .occ .occupant { color: #3fb950; font-weight: 600; }
  .occ .free { color: var(--muted); }
  .occ .meta2 { color: var(--muted); font-size: 12px; margin-top: 6px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px;
    background: var(--green); vertical-align: middle; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--muted); }
  tr.stale td { opacity: .5; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Room<span>Pulse</span></h1>
    <div class="sub">Smart layer on top of Zoom Workspace · iBeacon presence</div>
  </div>
  <div class="meta"><span class="dot"></span><span id="mode">—</span></div>
</header>
<main>
  <div class="row">
    <button onclick="sync()">Re-sync from Zoom</button>
    <button class="ghost" onclick="refresh()">Refresh</button>
    <span class="meta" id="updated"></span>
  </div>

  <section>
    <h2>Live Occupancy — who's in each room</h2>
    <div id="occupancy" class="occgrid"></div>
  </section>

  <section>
    <h2>Devices — phones reporting presence</h2>
    <div id="devices"></div>
  </section>

  <section>
    <h2>Reservations</h2>
    <div id="reservations"></div>
  </section>

  <section>
    <h2>Meeting Rooms</h2>
    <div id="rooms"></div>
  </section>
</main>

<script>
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function fmtTime(s) {
  if (!s) return "—";
  const d = new Date(s);
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}
function checkBadge(status) {
  if (status === "checked_in") return '<span class="badge b-green">checked in</span>';
  if (status === "checked_out") return '<span class="badge b-muted">checked out</span>';
  return '<span class="badge b-amber">not checked in</span>';
}
function roomName(rooms, wsId) {
  const r = rooms.find(x => x.zoom_workspace_id === wsId);
  return r ? r.name : wsId;
}
function fmtAgo(sec) {
  if (sec == null) return "—";
  if (sec < 60) return sec + "s ago";
  if (sec < 3600) return Math.floor(sec / 60) + "m ago";
  return Math.floor(sec / 3600) + "h ago";
}

async function refresh() {
  const [rRes, rRooms, rOcc, rDev] = await Promise.all([
    fetch("/reservations").then(r => r.json()),
    fetch("/rooms").then(r => r.json()),
    fetch("/occupancy").then(r => r.json()),
    fetch("/devices").then(r => r.json()),
  ]);
  const rooms = rRooms.rooms || [];
  const reservations = rRes.reservations || [];
  const devices = rDev.devices || [];
  const occByWs = {};
  (rOcc.occupancy || []).forEach(o => { occByWs[o.workspace_id] = o; });

  // Devices table — each phone and the room it last reported (joined to /rooms).
  const STALE_SEC = 120;
  const dt = devices.length ? `
    <table><thead><tr>
      <th>Device</th><th>Name</th><th>Room</th><th>Last seen</th>
    </tr></thead><tbody>
    ${devices.map(d => {
      const inRoom = d.workspace_id
        ? `<span class="badge b-green">${esc(roomName(rooms, d.workspace_id))}</span>`
        : '<span class="badge b-muted">no room</span>';
      const stale = d.last_seen_sec > STALE_SEC ? " class=\"stale\"" : "";
      return `<tr${stale}>
        <td class="mono">${esc(d.device_id)}</td>
        <td>${esc(d.display_name || "—")}</td>
        <td>${inRoom}</td>
        <td class="meta">${fmtAgo(d.last_seen_sec)}</td>
      </tr>`;
    }).join("")}
    </tbody></table>` : '<div class="empty">No devices have reported yet.</div>';
  document.getElementById("devices").innerHTML = dt;

  // Reservations table
  const rt = reservations.length ? `
    <table><thead><tr>
      <th>Room</th><th>User</th><th>Start</th><th>End</th><th>Check-in</th>
    </tr></thead><tbody>
    ${reservations.map(v => `<tr>
      <td>${esc(roomName(rooms, v.zoom_workspace_id))}</td>
      <td>${esc(v.user_email || v.user_id || "—")}</td>
      <td>${fmtTime(v.start_time)}</td>
      <td>${fmtTime(v.end_time)}</td>
      <td>${checkBadge(v.check_in_status)}</td>
    </tr>`).join("")}
    </tbody></table>` : '<div class="empty">No reservations in the current window.</div>';
  document.getElementById("reservations").innerHTML = rt;

  // Rooms table — with presence simulation buttons
  const rmt = rooms.length ? `
    <table><thead><tr>
      <th>Room</th><th>Floor</th><th>Capacity</th><th>Equipment</th><th>Simulate phone</th>
    </tr></thead><tbody>
    ${rooms.map(r => `<tr>
      <td>${esc(r.name)}</td>
      <td>${r.floor || "—"}</td>
      <td>${r.capacity || "—"}</td>
      <td class="tv">${r.has_tv ? "TV / Zoom Room" : "Reservation-only"}</td>
      <td>
        <button class="sim" onclick="presence('${r.zoom_workspace_id}','entered')">Arrive</button>
        <button class="sim ghost" onclick="presence('${r.zoom_workspace_id}','exited')">Leave</button>
      </td>
    </tr>`).join("")}
    </tbody></table>` : '<div class="empty">No rooms yet.</div>';
  document.getElementById("rooms").innerHTML = rmt;

  // Live occupancy — how many people are in each room (from presence)
  const occ = rooms.map(r => {
    const ws = r.zoom_workspace_id;
    const count = (occByWs[ws] && occByWs[ws].count) || 0;
    const users = (occByWs[ws] && occByWs[ws].users) || [];
    const cap = r.capacity ? `${count}/${r.capacity}` : `${count}`;
    const booker = reservations.find(v =>
      v.zoom_workspace_id === ws && v.check_in_status === "checked_in");

    const head = count === 1 ? "1 person" : `${count} people`;
    const sim = `<div class="meta2">
        <button class="sim" onclick="presence('${ws}','entered')">＋ Person</button>
        <button class="sim ghost" onclick="presence('${ws}','exited')">－ Person</button>
      </div>`;

    if (count > 0) {
      const names = users.map(u => esc(booker && u === booker.user_id ? (booker.user_email || u) : u)).join(", ");
      return `<div class="occ busy">
        <div class="rn">${esc(r.name)}<span class="cap">👤 ${cap}</span></div>
        <div class="who occupant">● ${head} in the room</div>
        <div class="meta2">${names}</div>
        ${sim}
      </div>`;
    }
    const booked = reservations.find(v =>
      v.zoom_workspace_id === ws && v.check_in_status === "not_checked_in");
    const sub = booked
      ? `Booked ${fmtTime(booked.start_time)}–${fmtTime(booked.end_time)} · awaiting check-in`
      : "No booking";
    return `<div class="occ">
      <div class="rn">${esc(r.name)}<span class="cap">👤 ${cap}</span></div>
      <div class="who free">○ Empty</div>
      <div class="meta2">${sub}</div>
      ${sim}
    </div>`;
  }).join("");
  document.getElementById("occupancy").innerHTML = occ;

  document.getElementById("updated").textContent =
    "Updated " + new Date().toLocaleTimeString();
}

async function sync() {
  document.getElementById("updated").textContent = "Syncing…";
  try { await fetch("/sync", { method: "POST" }); } catch (e) {}
  refresh();
}

const simGuests = {}; // workspace_id -> stack of simulated person ids
async function presence(workspaceID, eventType) {
  simGuests[workspaceID] = simGuests[workspaceID] || [];
  let userID;
  if (eventType === "entered") {
    userID = "Guest " + (simGuests[workspaceID].length + 1);
    simGuests[workspaceID].push(userID);
  } else {
    userID = simGuests[workspaceID].pop() || "user-1";
  }
  try {
    await fetch("/presence", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ workspace_id: workspaceID, user_id: userID, event_type: eventType, confidence: 0.95 }),
    });
  } catch (e) {}
  refresh();
}

async function loadMode() {
  try {
    const m = await fetch("/info").then(r => r.json());
    document.getElementById("mode").textContent = "mode: " + m.zoom_mode;
  } catch (e) { document.getElementById("mode").textContent = ""; }
}

loadMode();
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
