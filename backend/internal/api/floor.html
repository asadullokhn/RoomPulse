<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RoomPulse · Floor plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0A0F1F; --ink-2: #0C1428; --panel: #111A33; --line: rgba(150,170,220,.12);
    --text: #EAEEFB; --muted: #818DB4; --faint: #5C668A;
    --signal: #2FE6B0; --signal-line: rgba(47,230,176,.55);
    --amber: #F4B740; --accent: #6C8BFF;
    --f-display: "Space Grotesk", system-ui, sans-serif;
    --f-body: "IBM Plex Sans", system-ui, sans-serif;
    --f-mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; color: var(--text); font-family: var(--f-body); font-size: 14px;
    background: linear-gradient(180deg, var(--ink-2), var(--ink) 40%);
    display: flex; flex-direction: column; overflow: hidden; }

  header { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    padding: 13px 22px; border-bottom: 1px solid var(--line); background: rgba(10,15,31,.7);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); z-index: 5; }
  .brand { display: flex; align-items: center; gap: 11px; }
  .beacon { position: relative; width: 11px; height: 11px; }
  .beacon i { position: absolute; inset: 0; margin: auto; width: 9px; height: 9px; border-radius: 50%;
    background: var(--signal); box-shadow: 0 0 12px var(--signal); }
  .beacon::after { content: ""; position: absolute; inset: -2px; border-radius: 50%;
    border: 1.5px solid var(--signal); opacity: 0; animation: ping 2.6s cubic-bezier(.2,.6,.3,1) infinite; }
  @keyframes ping { 0% { transform: scale(.7); opacity: .7; } 80%,100% { transform: scale(2.6); opacity: 0; } }
  .brand h1 { font-family: var(--f-display); font-size: 18px; font-weight: 700; margin: 0; }
  .brand h1 b { color: var(--signal); }
  .brand .tag { font-size: 11px; color: var(--muted); margin-top: 1px; }
  nav { display: flex; gap: 6px; }
  nav a { font-family: var(--f-mono); font-size: 12px; text-decoration: none; color: var(--muted);
    padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px; }
  nav a.on { color: var(--signal); border-color: var(--signal-line); }
  nav a:hover { color: var(--text); }
  .legend { display: flex; gap: 16px; align-items: center; font-size: 12px; color: var(--muted); }
  .legend i { display: inline-block; width: 11px; height: 11px; border-radius: 3px; margin-right: 6px;
    vertical-align: -1px; border: 1px solid; }
  .lg-free i { background: rgba(47,230,176,.18); border-color: var(--signal-line); }
  .lg-busy i { background: rgba(47,230,176,.5); border-color: var(--signal); }

  .viewport { position: relative; flex: 1; overflow: hidden; cursor: grab; touch-action: none; }
  .viewport.drag { cursor: grabbing; }
  .stage { position: absolute; top: 0; left: 0; width: 2489px; height: 1380px;
    transform-origin: 0 0; will-change: transform; }
  .floorimg { display: block; width: 2489px; height: 1380px; user-select: none; -webkit-user-drag: none;
    border-radius: 2px; }
  .overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .overlay polygon { fill: rgba(47,230,176,.16); stroke: var(--signal-line); stroke-width: 1.5;
    vector-effect: non-scaling-stroke; transition: fill .3s; }
  .overlay polygon.busy { fill: rgba(47,230,176,.42); stroke: var(--signal); }
  .overlay polygon.busy { animation: glow 2.6s ease-in-out infinite; }
  @keyframes glow { 0%,100% { fill: rgba(47,230,176,.30); } 50% { fill: rgba(47,230,176,.5); } }

  .labels { position: absolute; inset: 0; pointer-events: none; }
  .lbl { position: absolute; transform: translate(-50%,-50%); display: flex; flex-direction: column;
    align-items: center; gap: 4px; text-align: center; max-width: 160px; color: #fff;
    text-shadow: 0 1px 2px rgba(7,11,22,.95), 0 0 5px rgba(7,11,22,.85); }
  .lbl .ico { width: 30px; height: 30px; opacity: .95; }
  .lbl .ico svg { width: 100%; height: 100%; }
  .lbl .nm { font-family: var(--f-display); font-weight: 600; font-size: 23px; line-height: 1.1; }
  .lbl .cnt { font-family: var(--f-mono); font-size: 17px; color: var(--signal);
    text-shadow: 0 0 8px rgba(0,0,0,.8); }
  .lbl.sm .nm { font-size: 17px; }
  .lbl.sm .ico { width: 22px; height: 22px; }

  .zoomctl { position: absolute; right: 16px; bottom: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 4; }
  .zoomctl button { width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--line);
    background: rgba(17,26,51,.85); backdrop-filter: blur(8px); color: var(--text); font-size: 18px;
    cursor: pointer; display: grid; place-items: center; transition: border-color .15s, background .15s; }
  .zoomctl button:hover { border-color: var(--accent); background: rgba(28,39,71,.9); }
  .zoomctl button:active { transform: translateY(1px); }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .hint { position: absolute; left: 16px; bottom: 16px; font-family: var(--f-mono); font-size: 11px;
    color: var(--faint); z-index: 4; pointer-events: none; }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; } }
  @media (max-width: 640px) { .legend, .brand .tag { display: none; } }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="beacon"><i></i></span>
    <div><h1>Room<b>Pulse</b></h1><div class="tag">Apple Developer Academy · Bali</div></div>
  </div>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/floor" class="on">Floor plan</a>
  </nav>
  <div class="legend">
    <span class="lg-free"><i></i>Available</span>
    <span class="lg-busy"><i></i>Occupied</span>
  </div>
</header>

<div class="viewport" id="vp">
  <div class="stage" id="stage">
    <img class="floorimg" src="/floor/image" alt="Floor plan" draggable="false" />
    <svg class="overlay" id="ovl" preserveAspectRatio="none"></svg>
    <div class="labels" id="labels"></div>
  </div>
  <div class="hint">Scroll to zoom · drag to pan</div>
  <div class="zoomctl">
    <button id="zin" title="Zoom in" aria-label="Zoom in">+</button>
    <button id="zout" title="Zoom out" aria-label="Zoom out">−</button>
    <button id="zfit" title="Fit to screen" aria-label="Fit to screen">⤢</button>
  </div>
</div>

<script>
const NAT_W = 2489, NAT_H = 1380;
function esc(s){ return String(s ?? "").replace(/[&<>"']/g, c =>
  ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

const ICON_ROOM = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="1.5"/><path d="M8 20h8M12 16v4"/></svg>';
const ICON_WS = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';

const vp = document.getElementById("vp");
const stage = document.getElementById("stage");
const ovl = document.getElementById("ovl");
const labels = document.getElementById("labels");

let scale = 1, panX = 0, panY = 0, minScale = .2, maxScale = 6;
const apply = () => { stage.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`; };
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));

function fit() {
  const r = vp.getBoundingClientRect();
  const pad = 24;
  scale = Math.min((r.width - pad*2)/NAT_W, (r.height - pad*2)/NAT_H);
  minScale = scale * 0.6; maxScale = scale * 9;
  panX = (r.width - NAT_W*scale)/2;
  panY = (r.height - NAT_H*scale)/2;
  apply();
}
function zoomAt(cx, cy, factor) {
  const ns = clamp(scale*factor, minScale, maxScale);
  panX = cx - (cx-panX)*(ns/scale);
  panY = cy - (cy-panY)*(ns/scale);
  scale = ns; apply();
}
vp.addEventListener("wheel", e => {
  e.preventDefault();
  const r = vp.getBoundingClientRect();
  zoomAt(e.clientX-r.left, e.clientY-r.top, e.deltaY < 0 ? 1.12 : 1/1.12);
}, { passive: false });

let dragging = false, lx = 0, ly = 0;
vp.addEventListener("pointerdown", e => { dragging = true; lx = e.clientX; ly = e.clientY;
  vp.classList.add("drag"); vp.setPointerCapture(e.pointerId); });
vp.addEventListener("pointermove", e => { if (!dragging) return;
  panX += e.clientX-lx; panY += e.clientY-ly; lx = e.clientX; ly = e.clientY; apply(); });
vp.addEventListener("pointerup", e => { dragging = false; vp.classList.remove("drag"); });
const centerZoom = f => { const r = vp.getBoundingClientRect(); zoomAt(r.width/2, r.height/2, f); };
document.getElementById("zin").onclick  = () => centerZoom(1.3);
document.getElementById("zout").onclick = () => centerZoom(1/1.3);
document.getElementById("zfit").onclick = fit;
window.addEventListener("resize", fit);

// --- build overlay from /floor/rooms, color from /occupancy ---
let vb = { x: 11.4, y: 130.7, w: 1207.6, h: 715.3 };
const cells = []; // { name, poly, cntEl }

function centroid(pts){ let x=0,y=0; for (const p of pts){ x+=p[0]; y+=p[1]; } return [x/pts.length, y/pts.length]; }

async function build() {
  const data = await fetch("/floor/rooms").then(r => r.json());
  vb = data.view_box || vb;
  ovl.setAttribute("viewBox", `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  const rooms = data.rooms || [];
  const polys = [], lbls = [];
  rooms.forEach((rm, i) => {
    const pts = rm.points.map(p => p.join(",")).join(" ");
    polys.push(`<polygon data-i="${i}" points="${pts}"/>`);
    const [cx, cy] = centroid(rm.points);
    const left = ((cx - vb.x) / vb.w) * NAT_W;
    const top  = ((cy - vb.y) / vb.h) * NAT_H;
    const small = rm.kind !== "room" ? " sm" : "";
    lbls.push(`<div class="lbl${small}" data-i="${i}" style="left:${left}px;top:${top}px">
      <span class="ico">${rm.kind === "room" ? ICON_ROOM : ICON_WS}</span>
      <span class="nm">${esc(rm.name)}</span>
      <span class="cnt" data-cnt="${i}"></span></div>`);
  });
  ovl.innerHTML = polys.join("");
  labels.innerHTML = lbls.join("");
  rooms.forEach((rm, i) => cells.push({
    name: rm.name,
    poly: ovl.querySelector(`polygon[data-i="${i}"]`),
    cntEl: labels.querySelector(`[data-cnt="${i}"]`),
  }));
  fit();
  paint();
  setInterval(paint, 3000);
}

// Map floor room name -> live occupancy via the backend's rooms + occupancy.
function norm(s){ return String(s||"").toLowerCase().replace(/\s+/g," ").trim(); }
async function paint() {
  let rooms = [], occ = [];
  try {
    [rooms, occ] = await Promise.all([
      fetch("/rooms").then(r => r.json()).then(d => d.rooms || []),
      fetch("/occupancy").then(r => r.json()).then(d => d.occupancy || []),
    ]);
  } catch (e) { return; }
  const wsCount = {};
  occ.forEach(o => { wsCount[o.workspace_id] = o.count; });
  const nameCount = {};
  rooms.forEach(r => { nameCount[norm(r.name)] = wsCount[r.zoom_workspace_id] || 0; });
  for (const c of cells) {
    const n = nameCount[norm(c.name)] || 0;
    c.poly.classList.toggle("busy", n > 0);
    c.cntEl.textContent = n > 0 ? (n === 1 ? "1 here" : n + " here") : "";
  }
}

build();
</script>
</body>
</html>
