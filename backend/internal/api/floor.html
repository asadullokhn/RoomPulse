<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RoomPulse · Floor plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0A0F1F; --ink-2: #0C1428; --panel: #111A33; --line: rgba(150,170,220,.12);
    --text: #EAEEFB; --muted: #818DB4; --faint: #5C668A;
    --accent: #6C8BFF; --amber: #F4B740;
    /* shared room-state tokens (also used on the dashboard) */
    --live: #2FE6B0; --live-fill: rgba(47,230,176,.30); --live-line: #2FE6B0;
    --open-fill: rgba(124,140,170,.12); --open-line: rgba(176,190,224,.60); --open-text: #C7D0EA;
    --f-display: "Space Grotesk", system-ui, sans-serif;
    --f-body: "IBM Plex Sans", system-ui, sans-serif;
    --f-mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; color: var(--text); font-family: var(--f-body); font-size: 14px;
    background: var(--ink); display: flex; flex-direction: column; overflow: hidden; }

  header { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
    padding: 13px 22px; border-bottom: 1px solid var(--line); background: rgba(10,15,31,.72);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); z-index: 5; }
  .brand { display: flex; align-items: center; gap: 11px; }
  .beacon { position: relative; width: 11px; height: 11px; }
  .beacon i { position: absolute; inset: 0; margin: auto; width: 9px; height: 9px; border-radius: 50%;
    background: var(--live); box-shadow: 0 0 12px var(--live); }
  .beacon::after { content: ""; position: absolute; inset: -2px; border-radius: 50%;
    border: 1.5px solid var(--live); opacity: 0; animation: ping 2.6s cubic-bezier(.2,.6,.3,1) infinite; }
  @keyframes ping { 0% { transform: scale(.7); opacity: .7; } 80%,100% { transform: scale(2.6); opacity: 0; } }
  .brand h1 { font-family: var(--f-display); font-size: 18px; font-weight: 700; margin: 0; }
  .brand h1 b { color: var(--live); }
  .brand .tag { font-size: 11px; color: var(--muted); margin-top: 1px; }

  nav { display: flex; gap: 6px; }
  nav a { font-family: var(--f-mono); font-size: 12px; text-decoration: none; color: var(--muted);
    padding: 8px 13px; border: 1px solid var(--line); border-radius: 999px; }
  nav a.on { color: var(--live); border-color: var(--live-line); }
  nav a:hover { color: var(--text); }

  .right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .chip { font-family: var(--f-mono); font-size: 11px; color: var(--muted);
    border: 1px solid var(--line); border-radius: 999px; padding: 5px 11px; display: inline-flex; gap: 6px; align-items: center; }
  .chip .led { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); }
  .chip.live .led { background: var(--live); box-shadow: 0 0 8px var(--live); }
  .chip.down { color: var(--amber); border-color: rgba(244,183,64,.4); }
  .chip.down .led { background: var(--amber); box-shadow: 0 0 8px var(--amber); }

  /* legend mirrors the real room treatments so it teaches the encoding */
  .legend { display: flex; gap: 14px; align-items: center; font-size: 12px; color: var(--muted);
    background: rgba(17,26,51,.7); border: 1px solid var(--line); border-radius: 999px;
    padding: 6px 13px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .lg-item { display: inline-flex; align-items: center; gap: 7px; }
  .lg-item em { font-style: normal; font-family: var(--f-mono); color: var(--text); }
  .sw { width: 22px; height: 14px; border-radius: 4px; display: inline-block; }
  .sw-busy { background: var(--live-fill); border: 2px solid var(--live); box-shadow: 0 0 7px rgba(47,230,176,.5); }
  .sw-open { background: transparent; border: 1.5px dashed rgba(176,190,224,.6); }

  .viewport { position: relative; flex: 1; overflow: hidden; background: var(--ink); }
  .stage { position: absolute; top: 0; left: 0; width: 2489px; height: 1380px; transform-origin: 0 0; }
  .floorimg { display: block; width: 2489px; height: 1380px; user-select: none; -webkit-user-drag: none;
    filter: grayscale(.85) brightness(.5) contrast(1.1); }
  /* vignette so overlays read over any region and the eye centres on the plan */
  .scrim { position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(120% 90% at 50% 42%, rgba(10,15,31,.40), rgba(10,15,31,.66)); }
  .overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

  /* AVAILABLE: cool slate, hollow, dashed, static — recedes */
  .overlay polygon { fill: var(--open-fill); stroke: var(--open-line); stroke-width: 1.5;
    stroke-dasharray: 7 5; vector-effect: non-scaling-stroke; pointer-events: all; cursor: pointer;
    transition: fill .18s ease, stroke .18s ease; }
  .overlay polygon:hover { fill: rgba(176,190,224,.20); }
  .overlay polygon.busy:hover { fill: rgba(47,230,176,.42); }
  /* OCCUPIED: saturated teal, solid, glowing, breathing — the live signal */
  .overlay polygon.busy { fill: var(--live-fill); stroke: var(--live-line); stroke-width: 2.5;
    stroke-dasharray: none; filter: drop-shadow(0 0 7px rgba(47,230,176,.55));
    animation: liveGlow 2.8s ease-in-out infinite; }
  @keyframes liveGlow {
    0%,100% { filter: drop-shadow(0 0 5px rgba(47,230,176,.40)); }
    50%     { filter: drop-shadow(0 0 11px rgba(47,230,176,.70)); }
  }

  .labels { position: absolute; inset: 0; pointer-events: none; }
  .lbl { position: absolute; transform: translate(-50%,-50%); display: flex; flex-direction: column;
    align-items: center; gap: 5px; text-align: center; max-width: 172px; pointer-events: auto; cursor: pointer;
    background: rgba(8,12,24,.46); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
    border-radius: 11px; padding: 6px 10px; box-shadow: 0 2px 8px rgba(7,11,22,.45); transition: background .15s; }
  .lbl:hover { background: rgba(8,12,24,.68); }
  .lbl .ico { width: 25px; height: 25px; opacity: .9; color: var(--open-text); }
  .lbl .ico svg { width: 100%; height: 100%; }
  .lbl .nm { font-family: var(--f-display); font-weight: 600; font-size: 20px; line-height: 1.12; color: var(--open-text); }
  .lbl.busy .ico, .lbl.busy .nm { color: #fff; }
  .lbl.sm { padding: 5px 8px; max-width: 130px; }
  .lbl.sm .nm { font-size: 15px; } .lbl.sm .ico { width: 18px; height: 18px; }
  /* state chips: filled count pill (occupied) vs hollow ghost (available) */
  .pill { display: inline-flex; align-items: center; gap: 5px; font-family: var(--f-mono); font-weight: 600;
    font-size: 15px; font-variant-numeric: tabular-nums; background: var(--live); color: #06231B;
    padding: 3px 11px; border-radius: 999px; box-shadow: 0 0 12px rgba(47,230,176,.55); }
  .pill svg { width: 14px; height: 14px; }
  .ghost { font-family: var(--f-mono); font-size: 13px; color: var(--open-text);
    padding: 2px 10px; border: 1px dashed rgba(176,190,224,.5); border-radius: 999px; }
  .lbl.sm .pill { font-size: 13px; padding: 2px 9px; } .lbl.sm .ghost { font-size: 11px; }

  /* ---- room detail modal ---- */
  .modal[hidden] { display: none; }
  .modal { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg { position: absolute; inset: 0; background: rgba(6,9,18,.62); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
  .sheet { position: relative; width: 100%; max-width: 430px; max-height: 84vh; overflow: auto;
    background: linear-gradient(180deg, #16203C, #111A33); border: 1px solid var(--line);
    border-radius: 18px; padding: 20px; box-shadow: 0 24px 60px rgba(0,0,0,.5); animation: sheetIn .18s ease; }
  @keyframes sheetIn { from { opacity: 0; transform: translateY(10px) scale(.985); } to { opacity: 1; transform: none; } }
  .sheet-x { position: absolute; top: 13px; right: 13px; width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid var(--line); background: rgba(255,255,255,.04); color: var(--muted); font-size: 17px; line-height: 1; cursor: pointer; }
  .sheet-x:hover { color: #fff; border-color: var(--accent); }
  .sheet-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; padding-right: 34px; }
  .sheet-head h2 { font-family: var(--f-display); font-size: 21px; margin: 0; }
  .sheet-sub { font-size: 12px; color: var(--muted); margin-top: 3px; font-family: var(--f-mono); }
  .m-sec { margin-top: 18px; }
  .m-h { font-family: var(--f-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 9px; }
  .who-chip { display: inline-flex; align-items: center; gap: 6px; background: rgba(47,230,176,.12);
    border: 1px solid var(--live-line); color: #DFF6EE; border-radius: 999px; padding: 4px 11px; font-size: 13px; margin: 0 6px 7px 0; }
  .who-chip svg { width: 13px; height: 13px; }
  .m-empty { color: var(--faint); font-size: 13px; }
  .m-line strong { font-weight: 600; }
  .m-sub2 { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: var(--f-mono); }
  .act { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(150,170,220,.07); font-size: 13px; }
  .act:last-child { border-bottom: 0; }
  .act .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
  .act.enter .dot { background: var(--live); box-shadow: 0 0 7px var(--live); }
  .act.leave .dot { background: rgba(176,190,224,.7); }
  .act .ago { margin-left: auto; color: var(--faint); font-family: var(--f-mono); font-size: 11.5px; }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; } }
  @media (max-width: 720px) { .brand .tag { display: none; } }
  @media (max-width: 560px) { header { padding: 11px 14px; } .legend { font-size: 11px; gap: 10px; padding: 5px 10px; } }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="beacon"><i></i></span>
    <div><h1>Room<b>Pulse</b></h1><div class="tag">Apple Developer Academy · Bali</div></div>
  </div>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/floor" class="on" aria-current="page">Floor plan</a>
  </nav>
  <div class="right">
    <div class="legend" aria-label="Legend">
      <span class="lg-item"><span class="sw sw-busy"></span>Occupied <em id="lg-busy">0</em></span>
      <span class="lg-item"><span class="sw sw-open"></span>Open <em id="lg-open">0</em></span>
    </div>
    <span class="chip" id="conn"><span class="led"></span><span id="conn-text">connecting…</span></span>
  </div>
</header>

<div class="viewport" id="vp">
  <div class="stage" id="stage">
    <img class="floorimg" src="/floor/image" alt="Floor plan of Apple Developer Academy Bali" draggable="false" />
    <div class="scrim"></div>
    <svg class="overlay" id="ovl" preserveAspectRatio="none" aria-hidden="true"></svg>
    <div class="labels" id="labels" aria-live="polite" aria-label="Rooms"></div>
  </div>
</div>

<div class="modal" id="modal" hidden>
  <div class="modal-bg" id="modal-bg"></div>
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="m-name">
    <button class="sheet-x" id="m-close" aria-label="Close">✕</button>
    <div class="sheet-head">
      <div><h2 id="m-name"></h2><div class="sheet-sub" id="m-sub"></div></div>
      <span id="m-badge"></span>
    </div>
    <div class="m-sec"><div class="m-h">Inside now</div><div id="m-inside"></div></div>
    <div class="m-sec"><div class="m-h">Booking</div><div id="m-booking"></div></div>
    <div class="m-sec"><div class="m-h">Recent activity</div><div id="m-activity"></div></div>
  </div>
</div>

<script>
const NAT_W = 2489, NAT_H = 1380;
function esc(s){ return String(s ?? "").replace(/[&<>"']/g, c =>
  ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

const ICON_ROOM = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="1.5"/><path d="M8 20h8M12 16v4"/></svg>';
const ICON_WS = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
const ICON_PERSON = '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="3.4"/><path d="M5.5 20c0-3.6 2.9-6 6.5-6s6.5 2.4 6.5 6z"/></svg>';

function fmtTime(s){ if(!s) return "—"; return new Date(s).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }); }
function fmtAgoShort(s){ if(s==null) return ""; if(s<60) return s+"s"; if(s<3600) return Math.floor(s/60)+"m"; if(s<86400) return Math.floor(s/3600)+"h"; return Math.floor(s/86400)+"d"; }

const vp = document.getElementById("vp");
const stage = document.getElementById("stage");
const ovl = document.getElementById("ovl");
const labels = document.getElementById("labels");

let cacheRooms = [], cacheOcc = {};   // latest /rooms + /occupancy, for the modal
let modalName = null, modalWs = null; // currently open room
let lastFocus = null;                 // restore focus on modal close

// Static fit-to-screen (no zoom/pan): scale the plan to contain the viewport, centred.
function fit() {
  const r = vp.getBoundingClientRect();
  const pad = 28;
  const scale = Math.min((r.width - pad * 2) / NAT_W, (r.height - pad * 2) / NAT_H);
  const x = (r.width - NAT_W * scale) / 2;
  const y = (r.height - NAT_H * scale) / 2;
  stage.style.transform = `translate(${x}px,${y}px) scale(${scale})`;
}
window.addEventListener("resize", fit);

function setConn(ok) {
  const c = document.getElementById("conn");
  c.className = "chip " + (ok ? "live" : "down");
  document.getElementById("conn-text").textContent = ok ? "Live" : "Reconnecting…";
}

let vb = { x: 1.9, y: 153.0, w: 1209.3, h: 682.0 };
const cells = []; // { name, poly, lbl, chip }
function centroid(pts){ let x=0,y=0; for (const p of pts){ x+=p[0]; y+=p[1]; } return [x/pts.length, y/pts.length]; }

async function build() {
  const data = await fetch("/floor/rooms").then(r => r.json());
  vb = data.view_box || vb;
  ovl.setAttribute("viewBox", `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  const rooms = data.rooms || [];
  const polys = [], lbls = [];
  rooms.forEach((rm, i) => {
    polys.push(`<polygon data-i="${i}" points="${rm.points.map(p => p.join(",")).join(" ")}" role="img" aria-label="${esc(rm.name)}"/>`);
    const [cx, cy] = centroid(rm.points);
    const left = ((cx - vb.x) / vb.w) * NAT_W;
    const top  = ((cy - vb.y) / vb.h) * NAT_H;
    const small = rm.kind !== "room" ? " sm" : "";
    lbls.push(`<div class="lbl${small}" data-i="${i}" style="left:${left}px;top:${top}px">
      <span class="ico">${rm.kind === "room" ? ICON_ROOM : ICON_WS}</span>
      <span class="nm">${esc(rm.name)}</span>
      <span class="chip-slot" data-chip="${i}"></span></div>`);
  });
  ovl.innerHTML = polys.join("");
  labels.innerHTML = lbls.join("");
  rooms.forEach((rm, i) => cells.push({
    name: rm.name,
    poly: ovl.querySelector(`polygon[data-i="${i}"]`),
    lbl: labels.querySelector(`.lbl[data-i="${i}"]`),
    chip: labels.querySelector(`[data-chip="${i}"]`),
  }));
  for (const c of cells) {
    const open = () => { if (modalEl.hidden) openRoom(c.name); };
    c.poly.addEventListener("click", open);
    c.lbl.addEventListener("click", open);
    c.lbl.tabIndex = 0; c.lbl.setAttribute("role", "button");
    c.lbl.setAttribute("aria-label", `${c.name} — details`);
    c.lbl.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); } });
  }
  fit();
  paint();
  setInterval(paint, 3000);
}

// Map floor room name -> live occupancy via the backend's rooms + occupancy.
function norm(s){ return String(s||"").toLowerCase().replace(/\s+/g," ").trim(); }
async function paint() {
  let rooms = [], occ = [];
  try {
    [rooms, occ] = await Promise.all([
      fetch("/rooms").then(r => r.json()).then(d => d.rooms || []),
      fetch("/occupancy").then(r => r.json()).then(d => d.occupancy || []),
    ]);
  } catch (e) { setConn(false); return; }
  setConn(true);
  cacheRooms = rooms;
  cacheOcc = {};
  occ.forEach(o => { cacheOcc[o.workspace_id] = o; });
  const wsCount = {};
  occ.forEach(o => { wsCount[o.workspace_id] = o.count; });
  const nameCount = {};
  rooms.forEach(r => { nameCount[norm(r.name)] = wsCount[r.zoom_workspace_id] || 0; });
  let busyN = 0;
  for (const c of cells) {
    const n = nameCount[norm(c.name)] || 0;
    const busy = n > 0;
    if (busy) busyN++;
    c.poly.classList.toggle("busy", busy);
    c.lbl.classList.toggle("busy", busy);
    c.poly.setAttribute("aria-label", `${c.name}, ${busy ? n + (n === 1 ? " person" : " people") : "available"}`);
    const want = busy ? `<span class="pill">${ICON_PERSON}${n}</span>` : `<span class="ghost">Open</span>`;
    if (c.chip.innerHTML !== want) c.chip.innerHTML = want;
  }
  document.getElementById("lg-busy").textContent = busyN;
  document.getElementById("lg-open").textContent = cells.length - busyN;
  if (modalName) updateModal();
}

// ---- room detail modal ----
const modalEl = document.getElementById("modal");
function openRoom(name) {
  lastFocus = document.activeElement;
  modalName = name;
  const room = cacheRooms.find(r => norm(r.name) === norm(name));
  modalWs = room ? room.zoom_workspace_id : null;
  document.getElementById("m-name").textContent = name;
  const type = room ? (room.has_tv ? "Zoom Room" : "Reservation-only") : "";
  const cap = room && room.capacity ? `Capacity ${room.capacity}` : "";
  document.getElementById("m-sub").textContent = [type, cap].filter(Boolean).join("  ·  ");
  vp.setAttribute("inert", ""); // background non-interactive + out of the a11y tree
  modalEl.hidden = false;
  document.body.style.overflow = "hidden";
  document.getElementById("m-close").focus();
  updateModal();
}
function closeModal() {
  modalName = null; modalWs = null;
  modalEl.hidden = true;
  vp.removeAttribute("inert");
  document.body.style.overflow = "";
  if (lastFocus && lastFocus.focus) lastFocus.focus();
  lastFocus = null;
}
async function updateModal() {
  if (!modalName) return;
  const ws = modalWs;
  const occ = (ws && cacheOcc[ws]) || { count: 0, users: [] };
  document.getElementById("m-badge").innerHTML = occ.count > 0
    ? `<span class="pill">${ICON_PERSON}${occ.count}</span>` : `<span class="ghost">Open</span>`;
  document.getElementById("m-inside").innerHTML = occ.count > 0
    ? (occ.users || []).map(u => `<span class="who-chip">${ICON_PERSON}${esc(u)}</span>`).join("")
    : `<div class="m-empty">No one here right now.</div>`;
  if (!ws) {
    document.getElementById("m-booking").innerHTML = `<div class="m-empty">—</div>`;
    document.getElementById("m-activity").innerHTML = `<div class="m-empty">Not mapped to a workspace.</div>`;
    return;
  }
  const [ev, resv] = await Promise.all([
    fetch(`/events?workspace_id=${encodeURIComponent(ws)}&limit=25`).then(r => r.json()).then(d => d.events || []).catch(() => []),
    fetch(`/reservations`).then(r => r.json()).then(d => d.reservations || []).catch(() => []),
  ]);
  if (modalWs !== ws) return; // closed or switched rooms while fetching
  const b = resv.find(v => v.zoom_workspace_id === ws);
  document.getElementById("m-booking").innerHTML = b
    ? `<div class="m-line"><strong>${esc(b.user_email || b.user_id || "—")}</strong></div>
       <div class="m-sub2">${fmtTime(b.start_time)}–${fmtTime(b.end_time)} · ${esc((b.check_in_status || "").replace(/_/g, " "))}</div>`
    : `<div class="m-empty">No booking today.</div>`;
  document.getElementById("m-activity").innerHTML = ev.length
    ? ev.map(e => `<div class="act ${e.kind === "enter" ? "enter" : "leave"}"><span class="dot"></span>
        <span>${esc(e.name || e.actor)} ${e.kind === "enter" ? "entered" : "left"}</span>
        <span class="ago">${fmtAgoShort(e.ago_sec)} ago</span></div>`).join("")
    : `<div class="m-empty">No activity recorded yet.</div>`;
}
document.getElementById("m-close").addEventListener("click", closeModal);
document.getElementById("modal-bg").addEventListener("click", closeModal);
document.addEventListener("keydown", e => { if (e.key === "Escape" && !modalEl.hidden) closeModal(); });

build();
</script>
</body>
</html>
