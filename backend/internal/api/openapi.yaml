openapi: 3.1.0
info:
  title: QuickRoom API
  version: "0.1.0"
  description: |
    Presence-aware meeting-room backend. Bluetooth iBeacons + the phone detect who is
    physically in a room; the backend reflects that onto Zoom Workspace reservations
    (auto check-in / check-out) and exposes live occupancy.

    Zoom stays the booking source of truth; this service keeps a faithful local mirror
    and drives reservation state from real presence.

    Modes (`ZOOM_MODE`): `mock` (no creds), `live` (admin server-to-server), `user`
    (your own OAuth). The `/oauth/*` endpoints exist only in `user` mode.
servers:
  - url: /
    description: This origin — the same host that served these docs ("Try it out" stays same-origin)
  - url: https://rp.asadullokhn.uz
    description: Production (Cloudflare-fronted)
  - url: http://localhost:8080
    description: Local
tags:
  - name: Health
    description: Liveness, readiness, and service info
  - name: Sync
    description: Pull Zoom workspaces + reservations into the local mirror
  - name: Presence
    description: Ingest phone presence and drive reservation check-in/out
  - name: Reservations
    description: Local mirror of Zoom reservations + manual check-in/out
  - name: Rooms & Beacons
    description: Rooms and the room↔iBeacon registry
  - name: Devices & Events
    description: Known-device registry and per-room activity history
  - name: Occupancy
    description: Live headcount per room
  - name: Notifications
    description: Outbox of grace reminders, no-show releases, and room-freed events
  - name: Collisions
    description: Live booker-vs-occupant conflicts (room used by someone other than the booker)
  - name: Reports
    description: Overstays and booking-health / utilization metrics for the admin panel
  - name: Diagnostics
    description: Device health + event-log dumps (in-memory, ephemeral)
  - name: Feedback
    description: Choices submitted from the pitch site (in-memory)
  - name: Floor
    description: Floor-plan projection and image
  - name: Auth
    description: Sign in with Apple (mobile app sessions) and Zoom user-OAuth (user mode only)
  - name: Users
    description: Admin-facing account management — unauthenticated, like the rest of the admin surface

paths:
  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe
      responses:
        "200": { description: Alive, content: { application/json: { schema: { $ref: '#/components/schemas/Health' } } } }
  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      responses:
        "200": { description: Ready, content: { application/json: { schema: { $ref: '#/components/schemas/Health' } } } }
  /info:
    get:
      tags: [Health]
      summary: Service info (Zoom mode + authorization state)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Info' }

  /sync:
    post:
      tags: [Sync]
      summary: Run one Zoom sync
      description: Pulls workspaces → rooms, then today's reservations, into the local mirror.
      responses:
        "200": { description: Synced, content: { application/json: { schema: { $ref: '#/components/schemas/SyncResult' } } } }
        "502": { $ref: '#/components/responses/BadGateway' }

  /rooms:
    get:
      tags: [Rooms & Beacons]
      summary: List rooms
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms: { type: array, items: { $ref: '#/components/schemas/Room' } }
  /beacons:
    get:
      tags: [Rooms & Beacons]
      summary: List the room↔iBeacon registry
      description: The mobile app polls this to learn which beacons to range/monitor.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  beacons: { type: array, items: { $ref: '#/components/schemas/BeaconEntry' } }
  /beacons/{workspace_id}:
    put:
      tags: [Rooms & Beacons]
      summary: Assign or update a room's beacon mapping
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uuid, major, minor]
              properties:
                uuid: { type: string }
                major: { type: integer, minimum: 0, maximum: 65535 }
                minor: { type: integer, minimum: 0, maximum: 65535 }
      responses:
        "200": { description: Saved, content: { application/json: { schema: { $ref: '#/components/schemas/BeaconEntry' } } } }
        "404": { $ref: '#/components/responses/NotFound' }
        "422": { $ref: '#/components/responses/Unprocessable' }
    delete:
      tags: [Rooms & Beacons]
      summary: Remove a room's beacon mapping
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: '#/components/responses/Ok' }
        "404": { $ref: '#/components/responses/NotFound' }

  /reservations:
    get:
      tags: [Reservations]
      summary: List reservations (local mirror)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  reservations: { type: array, items: { $ref: '#/components/schemas/Reservation' } }
    post:
      tags: [Reservations]
      summary: Book a room (QuickRoom-native booking)
      description: |
        Creates an app-sourced reservation (source == "app") — not a real Zoom
        reservation. Rejects the request if the room is already booked in that
        window by either a Zoom-synced or another app-sourced reservation.
      security: [{ sessionToken: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace_id, start_time, end_time]
              properties:
                workspace_id: { type: string }
                start_time: { type: string, format: date-time }
                end_time: { type: string, format: date-time }
      responses:
        "200": { description: Booked, content: { application/json: { schema: { $ref: '#/components/schemas/Reservation' } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { description: The room is already booked in that window, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        "422": { $ref: '#/components/responses/Unprocessable' }
  /reservations/mine:
    get:
      tags: [Reservations]
      summary: List the signed-in user's own bookings
      security: [{ sessionToken: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  reservations: { type: array, items: { $ref: '#/components/schemas/Reservation' } }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /reservations/{id}/cancel:
    post:
      tags: [Reservations]
      summary: Cancel your own app-sourced booking
      security: [{ sessionToken: [] }]
      parameters: [ { $ref: '#/components/parameters/ReservationId' } ]
      responses:
        "200": { description: Cancelled, content: { application/json: { schema: { $ref: '#/components/schemas/Reservation' } } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { description: "Not your reservation, or it isn't app-sourced", content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        "404": { $ref: '#/components/responses/NotFound' }
  /reservations/{id}/check-in:
    post:
      tags: [Reservations]
      summary: Check a reservation in
      description: Sends the event to Zoom, then reflects it locally.
      parameters: [ { $ref: '#/components/parameters/ReservationId' } ]
      responses:
        "200": { description: Updated reservation, content: { application/json: { schema: { $ref: '#/components/schemas/Reservation' } } } }
        "404": { $ref: '#/components/responses/NotFound' }
        "502": { $ref: '#/components/responses/BadGateway' }
  /reservations/{id}/check-out:
    post:
      tags: [Reservations]
      summary: Check a reservation out
      parameters: [ { $ref: '#/components/parameters/ReservationId' } ]
      responses:
        "200": { description: Updated reservation, content: { application/json: { schema: { $ref: '#/components/schemas/Reservation' } } } }
        "404": { $ref: '#/components/responses/NotFound' }
        "502": { $ref: '#/components/responses/BadGateway' }
  /admin/reservations/{id}/cancel:
    post:
      tags: [Reservations]
      summary: Cancel any app-sourced booking (admin)
      description: |
        The admin-facing counterpart to `/reservations/{id}/cancel` — not scoped
        to a session, so it can cancel any user's booking. Unauthenticated, like
        the rest of the admin surface.
      parameters: [ { $ref: '#/components/parameters/ReservationId' } ]
      responses:
        "200": { description: Cancelled, content: { application/json: { schema: { $ref: '#/components/schemas/Reservation' } } } }
        "403": { description: Not app-sourced, so not cancellable this way, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        "404": { $ref: '#/components/responses/NotFound' }

  /presence:
    post:
      tags: [Presence]
      summary: Ingest an arrive/leave event
      description: |
        Records a phone's `entered`/`exited` event for a room, updates headcount
        (newest-wins to drop out-of-order flaps), and best-effort drives the matching
        reservation's check-in/out. Returns the updated reservation, or a status object
        when the room has no reservation or the event was stale.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PresenceRequest' }
      responses:
        "200":
          description: Applied, recorded, or stale-ignored
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Reservation'
                  - $ref: '#/components/schemas/StatusResult'
        "400": { $ref: '#/components/responses/BadRequest' }
        "422": { $ref: '#/components/responses/Unprocessable' }
        "502": { $ref: '#/components/responses/BadGateway' }
  /presence/heartbeat:
    post:
      tags: [Presence]
      summary: Reconcile a device's current room
      description: |
        Idempotent full-state heartbeat (not a delta): reports the device's CURRENT room
        (`""` = none). A lost message can't strand a user — the next heartbeat corrects it.
        Called by the iOS app every few seconds.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HeartbeatRequest' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  room: { type: string, description: Echo of the current workspace id ("" = none) }
        "400": { $ref: '#/components/responses/BadRequest' }
        "422": { $ref: '#/components/responses/Unprocessable' }

  /occupancy:
    get:
      tags: [Occupancy]
      summary: Live headcount per room
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  occupancy: { type: array, items: { $ref: '#/components/schemas/OccupancyEntry' } }
  /notifications:
    get:
      tags: [Notifications]
      summary: Poll the notification outbox
      description: |
        Grace-window "are you coming?" pings, no-show releases, and room-freed
        events. The mobile app polls with `?recipient=` (its booker id/email);
        broadcasts (room-freed) have an empty recipient.
      parameters:
        - name: recipient
          in: query
          required: false
          description: Filter to one booker (user id or email)
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 100, maximum: 200 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications: { type: array, items: { $ref: '#/components/schemas/Notification' } }
  /collisions:
    get:
      tags: [Collisions]
      summary: Live booker-vs-occupant conflicts
      description: |
        Rooms occupied right now by someone other than the booker (the booker
        isn't among the present users). Presence stays the truth for "occupied";
        the booking says who *should* be there. The backend flags rather than
        silently checking in whoever walked in, so the admin panel can resolve it.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  collisions: { type: array, items: { $ref: '#/components/schemas/Collision' } }
  /overstays:
    get:
      tags: [Reports]
      summary: Rooms occupied past their booking's end
      description: |
        The inverse of a no-show: a booking has ended (by more than the overstay
        grace) but the room is still occupied, squeezing the next booker. Skipped
        when a following booking already owns the room.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  overstays: { type: array, items: { $ref: '#/components/schemas/Overstay' } }
  /utilization:
    get:
      tags: [Reports]
      summary: Booking-health / utilization report
      description: |
        At-a-glance counts over the current reservation set plus live occupancy:
        bookings, checked-in, auto-reclaimed no-shows, and the no-show rate — the
        "are rooms actually used?" metric for the admin dashboard.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Utilization' }

  /devices/apns:
    post:
      tags: [Devices & Events]
      summary: Register the caller's APNs device token
      description: |
        The app calls this after registerForRemoteNotifications succeeds so the
        backend can push outbox notifications (grace reminders, no-show
        releases, room-freed) to the phone. The token re-homes to whichever
        account is signed in on the device.
      security: [{ sessionToken: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string, description: Hex APNs device token }
      responses:
        "200": { $ref: '#/components/responses/Ok' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "422": { $ref: '#/components/responses/Unprocessable' }
  /devices:
    get:
      tags: [Devices & Events]
      summary: Known-device registry (durable)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices: { type: array, items: { $ref: '#/components/schemas/DeviceView' } }
  /events:
    get:
      tags: [Devices & Events]
      summary: A room's recent presence activity
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string, maxLength: 128 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 30, minimum: 1, maximum: 200 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  events: { type: array, items: { $ref: '#/components/schemas/EventView' } }
        "400": { $ref: '#/components/responses/BadRequest' }

  /diag:
    get:
      tags: [Diagnostics]
      summary: Recent device diagnostics (newest first)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports: { type: array, items: { $ref: '#/components/schemas/DiagReport' } }
    post:
      tags: [Diagnostics]
      summary: Submit a device diagnostics snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DiagReportInput' }
      responses:
        "200": { $ref: '#/components/responses/Ok' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "422": { $ref: '#/components/responses/Unprocessable' }
  /history:
    get:
      tags: [Diagnostics]
      summary: Recent device event-log dumps
      parameters:
        - name: format
          in: query
          required: false
          description: "`text` renders the newest dump as a plain timeline; default is JSON."
          schema: { type: string, enum: [text] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports: { type: array, items: { $ref: '#/components/schemas/HistoryReport' } }
            text/plain:
              schema: { type: string }
    post:
      tags: [Diagnostics]
      summary: Submit a device event-log dump
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HistoryReportInput' }
      responses:
        "200":
          description: Stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  events: { type: integer }
        "400": { $ref: '#/components/responses/BadRequest' }
        "422": { $ref: '#/components/responses/Unprocessable' }

  /decision:
    get:
      tags: [Feedback]
      summary: Latest next-step choice + history
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  latest: { $ref: '#/components/schemas/Decision' }
                  history: { type: array, items: { $ref: '#/components/schemas/Decision' } }
    post:
      tags: [Feedback]
      summary: Submit a next-step choice
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DecisionInput' }
      responses:
        "200": { $ref: '#/components/responses/Ok' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "422": { $ref: '#/components/responses/Unprocessable' }
  /scenario-answers:
    get:
      tags: [Feedback]
      summary: Every teammate's scenario answers, grouped by name
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  by_person:
                    type: object
                    additionalProperties:
                      type: object
                      additionalProperties: { $ref: '#/components/schemas/ScenarioAnswer' }
    post:
      tags: [Feedback]
      summary: Record scenario answers for one or several submitters
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScenarioAnswersInput' }
      responses:
        "200":
          description: Stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  people: { type: integer }
                  stored: { type: integer }
        "400": { $ref: '#/components/responses/BadRequest' }
        "422": { $ref: '#/components/responses/Unprocessable' }

  /floor/rooms:
    get:
      tags: [Floor]
      summary: Floor-plan rooms (polygons + calibration)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FloorRooms' }
  /floor/image:
    get:
      tags: [Floor]
      summary: Floor-plan background image (PNG)
      responses:
        "200": { description: PNG, content: { image/png: { schema: { type: string, format: binary } } } }

  /auth/apple:
    post:
      tags: [Auth]
      summary: Sign in with Apple
      description: Verifies an Apple identity token (obtained on-device via ASAuthorizationAppleIDProvider) and issues a session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identity_token]
              properties:
                identity_token:
                  type: string
                  description: The JWT identityToken from Apple's on-device sign-in.
                name:
                  type: string
                  description: The user's display name. Apple only sends this on the very first authorization — forward it then.
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_token: { type: string }
                  user: { $ref: '#/components/schemas/User' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "422": { $ref: '#/components/responses/Unprocessable' }
  /auth/logout:
    post:
      tags: [Auth]
      summary: Sign out
      security: [{ sessionToken: [] }]
      responses:
        "200": { $ref: '#/components/responses/Ok' }

  /users:
    get:
      tags: [Users]
      summary: List every app account
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  users: { type: array, items: { $ref: '#/components/schemas/User' } }
  /users/{id}/reservations:
    get:
      tags: [Users]
      summary: A user's bookings (any status/source)
      parameters: [ { $ref: '#/components/parameters/UserId' } ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  reservations: { type: array, items: { $ref: '#/components/schemas/Reservation' } }
        "404": { $ref: '#/components/responses/NotFound' }
  /users/{id}:
    delete:
      tags: [Users]
      summary: Delete an account
      description: |
        Cancels the user's open app-sourced bookings and revokes every session
        before deleting the account row — a removed account can't be left
        holding a room or a live session.
      parameters: [ { $ref: '#/components/parameters/UserId' } ]
      responses:
        "200": { $ref: '#/components/responses/Ok' }
        "404": { $ref: '#/components/responses/NotFound' }

  /oauth/login:
    get:
      tags: [Auth]
      summary: Begin Zoom user-OAuth (user mode only)
      responses:
        "302": { description: Redirect to Zoom's consent screen }
  /oauth/callback:
    get:
      tags: [Auth]
      summary: Zoom OAuth redirect target (user mode only)
      parameters:
        - { name: code, in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string } }
        - { name: error, in: query, schema: { type: string } }
      responses:
        "200": { description: Authorized }
        "400": { $ref: '#/components/responses/BadRequest' }
        "502": { $ref: '#/components/responses/BadGateway' }

components:
  securitySchemes:
    sessionToken:
      type: http
      scheme: bearer
      description: "Opaque session token returned by POST /auth/apple. Send as `Authorization: Bearer <token>`."
  parameters:
    ReservationId:
      name: id
      in: path
      required: true
      schema: { type: string }
    UserId:
      name: id
      in: path
      required: true
      schema: { type: string }
  responses:
    Ok:
      description: OK
      content: { application/json: { schema: { $ref: '#/components/schemas/StatusResult' } } }
    BadRequest:
      description: Malformed request body
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Unauthorized:
      description: Missing, invalid, or expired session
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Unprocessable:
      description: Validation failed
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    NotFound:
      description: Not found
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    BadGateway:
      description: Upstream (Zoom) error
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]
    StatusResult:
      type: object
      properties:
        status: { type: string, example: ok }
        workspace_id: { type: string }
    Health:
      type: object
      properties:
        status: { type: string, example: ok }
    Info:
      type: object
      properties:
        zoom_mode: { type: string, enum: [mock, live, user] }
        authorized: { type: boolean }
    SyncResult:
      type: object
      properties:
        rooms: { type: integer }
        reservations: { type: integer }
        synced_at: { type: string, format: date-time }
    Room:
      type: object
      properties:
        room_id: { type: string }
        zoom_workspace_id: { type: string }
        name: { type: string }
        floor: { type: string }
        capacity: { type: integer }
        has_tv: { type: boolean }
        is_zoom_room: { type: boolean }
        beacon_uuid: { type: string }
        beacon_major: { type: integer }
        beacon_minor: { type: integer }
    BeaconEntry:
      type: object
      properties:
        workspace_id: { type: string }
        uuid: { type: string }
        major: { type: integer }
        minor: { type: integer }
        name: { type: string, description: Joined room name }
    Reservation:
      type: object
      properties:
        reservation_id: { type: string }
        room_id: { type: string }
        zoom_workspace_id: { type: string }
        user_id: { type: string }
        user_email: { type: string }
        start_time: { type: string, format: date-time }
        end_time: { type: string, format: date-time }
        status: { type: string, enum: [booked, no_show, released, cancelled] }
        check_in_status: { type: string, enum: [not_checked_in, checked_in, checked_out] }
        source: { type: string, enum: [zoom, app], description: "zoom = mirrored from Zoom; app = booked via POST /reservations" }
        booked_by_user_id: { type: string, description: set only when source == app }
    User:
      type: object
      properties:
        user_id: { type: string }
        email: { type: string }
        name: { type: string }
        created_at: { type: string, format: date-time }
    OccupancyEntry:
      type: object
      properties:
        workspace_id: { type: string }
        count: { type: integer }
        users: { type: array, items: { type: string } }
    Notification:
      type: object
      properties:
        id: { type: integer, format: int64 }
        type: { type: string, enum: [grace_reminder, no_show_released, room_freed, collision, overstay] }
        level: { type: integer, description: reminder ladder step (1 or 2) }
        workspace_id: { type: string }
        reservation_id: { type: string }
        recipient: { type: string, description: booker id/email; empty = broadcast }
        title: { type: string }
        body: { type: string }
        created_at: { type: string, format: date-time }
    Collision:
      type: object
      properties:
        workspace_id: { type: string }
        room_name: { type: string }
        reservation_id: { type: string }
        booker: { type: string, description: who the room is booked to (id/email) }
        occupants: { type: array, items: { type: string }, description: who is present right now }
        since: { type: string, format: date-time }
    Overstay:
      type: object
      properties:
        workspace_id: { type: string }
        room_name: { type: string }
        reservation_id: { type: string }
        booker: { type: string }
        occupants: { type: array, items: { type: string } }
        ended_at: { type: string, format: date-time }
        over_by_sec: { type: integer, format: int64, description: seconds past the booked end }
    Utilization:
      type: object
      properties:
        bookings: { type: integer, description: reservations in the window }
        checked_in: { type: integer }
        no_show_released: { type: integer, description: auto-reclaimed no-shows }
        booked: { type: integer, description: still booked, not yet resolved }
        no_show_rate: { type: number, format: float, description: released / bookings (0..1) }
        rooms_total: { type: integer }
        rooms_occupied: { type: integer }
        people_present: { type: integer }
        generated_at: { type: string, format: date-time }
    DeviceView:
      type: object
      properties:
        device_id: { type: string }
        display_name: { type: string }
        workspace_id: { type: string, description: "\"\" = not in any room" }
        last_seen_sec: { type: integer, description: Seconds since last seen }
    EventView:
      type: object
      properties:
        kind: { type: string, enum: [enter, leave] }
        name: { type: string }
        actor: { type: string, description: device id or user id }
        ago_sec: { type: integer }
    PresenceRequest:
      type: object
      required: [workspace_id, user_id, event_type]
      properties:
        workspace_id: { type: string, maxLength: 128 }
        user_id: { type: string, maxLength: 128 }
        display_name: { type: string, maxLength: 96 }
        event_type: { type: string, enum: [entered, exited] }
        confidence: { type: number, format: double }
        event_ts: { type: integer, format: int64, description: Epoch millis on the device }
    HeartbeatRequest:
      type: object
      required: [device_id]
      properties:
        device_id: { type: string, maxLength: 128 }
        display_name: { type: string, maxLength: 96 }
        workspace_id: { type: string, maxLength: 128, description: "\"\" = not in any room" }
        ts: { type: integer, format: int64 }
    DiagRow:
      type: object
      properties:
        label: { type: string }
        value: { type: string }
        level: { type: string }
        hint: { type: string }
    DiagReportInput:
      type: object
      required: [device_id]
      properties:
        device_id: { type: string, maxLength: 128 }
        display_name: { type: string, maxLength: 96 }
        summary: { type: string, maxLength: 200 }
        ready: { type: boolean }
        rows: { type: array, items: { $ref: '#/components/schemas/DiagRow' } }
        line: { type: string, maxLength: 500 }
    DiagReport:
      allOf:
        - $ref: '#/components/schemas/DiagReportInput'
        - type: object
          properties:
            received_at: { type: string, format: date-time }
    HistoryEvent:
      type: object
      properties:
        ts: { type: integer, format: int64, description: Epoch millis on the device }
        kind: { type: string }
        detail: { type: string }
    HistoryReportInput:
      type: object
      required: [device_id]
      properties:
        device_id: { type: string, maxLength: 128 }
        name: { type: string, maxLength: 96 }
        events: { type: array, items: { $ref: '#/components/schemas/HistoryEvent' } }
    HistoryReport:
      allOf:
        - $ref: '#/components/schemas/HistoryReportInput'
        - type: object
          properties:
            received_at: { type: string, format: date-time }
    DecisionInput:
      type: object
      required: [choice]
      properties:
        choice: { type: string, maxLength: 32, description: "option key: scenarios|zoom|demo|config|custom" }
        label: { type: string, maxLength: 120 }
        custom: { type: string, maxLength: 500 }
        note: { type: string, maxLength: 1000 }
    Decision:
      allOf:
        - $ref: '#/components/schemas/DecisionInput'
        - type: object
          properties:
            received_at: { type: string, format: date-time }
    ScenarioAnswer:
      type: object
      properties:
        name: { type: string }
        scenario_id: { type: string }
        choice: { type: string }
        custom: { type: string }
        note: { type: string }
        received_at: { type: string, format: date-time }
    ScenarioAnswersInput:
      type: object
      required: [answers]
      properties:
        names: { type: array, items: { type: string }, description: One or several submitters }
        name: { type: string, description: Legacy single submitter }
        answers:
          type: array
          items:
            type: object
            required: [scenario_id]
            properties:
              scenario_id: { type: string, maxLength: 64 }
              choice: { type: string, maxLength: 160 }
              custom: { type: string, maxLength: 500 }
              note: { type: string, maxLength: 1000 }
    FloorRooms:
      type: object
      properties:
        rooms:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              points: { type: array, items: { type: array, items: { type: number } } }
              kind: { type: string, enum: [room, workspace] }
              capacity: { type: integer }
              screens: { type: integer }
              busy: { type: boolean }
        view_box:
          type: object
          properties:
            x: { type: number }
            y: { type: number }
            w: { type: number }
            h: { type: number }
        image:
          type: object
          properties:
            w: { type: integer }
            h: { type: integer }
