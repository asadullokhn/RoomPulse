<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QuickRoom API · Swagger UI</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/docs/swagger-ui.css">
<style>
  /* --- QuickRoom dark theme for Swagger UI --- */
  :root { --bg:#0A0F1F; --bg2:#0C1428; --panel:#0F1730; --line:rgba(150,170,220,.14);
          --line2:rgba(150,170,220,.25); --text:#EAEEFB; --muted:#B7C0DE; --faint:#818DB4; --teal:#2FE6B0; }
  body { margin:0; background:var(--bg); }
  .swagger-ui .topbar { display:none; }
  .swagger-ui, .swagger-ui .info li, .swagger-ui .info p, .swagger-ui .info table { color:var(--text); }

  /* header / info */
  .swagger-ui .info .title, .swagger-ui .info h1, .swagger-ui .info h2,
  .swagger-ui .info h3, .swagger-ui .info h4, .swagger-ui .info h5 { color:var(--text); }
  .swagger-ui .info p, .swagger-ui .info li, .swagger-ui .markdown p, .swagger-ui .markdown li,
  .swagger-ui .renderedMarkdown p, .swagger-ui .renderedMarkdown li { color:var(--muted); }
  .swagger-ui .info a, .swagger-ui a.nostyle { color:var(--teal); }
  .swagger-ui .info code, .swagger-ui .markdown code, .swagger-ui .renderedMarkdown code { background:#16203C; color:#8AB4FF; }

  /* servers / scheme band (was solid white) */
  .swagger-ui .scheme-container { background:var(--bg2); box-shadow:none; border-bottom:1px solid var(--line); }
  .swagger-ui .scheme-container .schemes-title, .swagger-ui .servers-title,
  .swagger-ui label, .swagger-ui .servers > label { color:var(--text); }
  .swagger-ui select, .swagger-ui input[type=text], .swagger-ui input[type=email],
  .swagger-ui input[type=password], .swagger-ui textarea {
    background:var(--bg2); color:var(--text); border:1px solid var(--line2); }
  .swagger-ui select { background-image:none; }

  /* tag section headers */
  .swagger-ui .opblock-tag { color:var(--text); border-bottom:1px solid var(--line); }
  .swagger-ui .opblock-tag small, .swagger-ui .opblock-tag small p { color:var(--faint); }
  .swagger-ui .opblock-tag:hover { background:rgba(150,170,220,.04); }

  /* operation blocks */
  .swagger-ui .opblock { background:var(--panel); border:1px solid var(--line); box-shadow:none; }
  .swagger-ui .opblock .opblock-summary { border-color:var(--line); }
  .swagger-ui .opblock .opblock-summary-path, .swagger-ui .opblock .opblock-summary-path__deprecated,
  .swagger-ui .opblock .opblock-summary-operation-id { color:var(--text); }
  .swagger-ui .opblock .opblock-summary-description { color:var(--muted); }
  .swagger-ui .opblock .opblock-section-header { background:var(--bg2); box-shadow:none; }
  .swagger-ui .opblock .opblock-section-header h4, .swagger-ui .opblock .opblock-section-header label,
  .swagger-ui .opblock .opblock-section-header > label > span { color:var(--text); }
  .swagger-ui .opblock-description-wrapper p, .swagger-ui .opblock-external-docs-wrapper p,
  .swagger-ui .opblock-title_normal p { color:var(--muted); }

  /* tables / params / models */
  .swagger-ui table thead tr th, .swagger-ui table thead tr td { color:var(--muted); border-color:var(--line2); }
  .swagger-ui .parameters-col_description p, .swagger-ui .parameter__name { color:var(--text); }
  .swagger-ui .parameter__type, .swagger-ui .parameter__in, .swagger-ui .prop-type,
  .swagger-ui .prop-format, .swagger-ui table.model tr td, .swagger-ui .prop-name { color:var(--muted); }
  .swagger-ui .parameter__enum, .swagger-ui .parameter__default, .swagger-ui .prop-enum { color:var(--faint); }
  .swagger-ui .model-title, .swagger-ui .model, .swagger-ui .models h4,
  .swagger-ui .model-toggle, .swagger-ui .models-control { color:var(--text); }
  .swagger-ui .models { background:var(--panel); border:1px solid var(--line); }
  .swagger-ui section.models .model-container, .swagger-ui .model-box { background:var(--bg2); }

  /* responses */
  .swagger-ui .responses-inner h4, .swagger-ui .responses-inner h5,
  .swagger-ui .response-col_status { color:var(--text); }
  .swagger-ui .response-col_links, .swagger-ui .responses-inner p { color:var(--faint); }
  .swagger-ui .response-col_description__inner div.markdown,
  .swagger-ui .response-col_description__inner div.renderedMarkdown { background:var(--bg2); color:var(--muted); }

  /* code samples */
  .swagger-ui .highlight-code, .swagger-ui .microlight, .swagger-ui textarea.curl { background:var(--bg2) !important; }
  .swagger-ui .opblock-body pre.microlight, .swagger-ui .opblock-body pre.microlight span { color:#DCE3F7 !important; }

  /* buttons / tabs */
  .swagger-ui .btn { color:var(--text); border-color:var(--line2); background:transparent; }
  .swagger-ui .btn.execute { background:var(--teal); color:var(--bg); border-color:var(--teal); }
  .swagger-ui .btn.authorize { color:var(--teal); border-color:var(--teal); }
  .swagger-ui .btn.authorize svg { fill:var(--teal); }
  .swagger-ui .tab li { color:var(--muted); }
  .swagger-ui svg.arrow, .swagger-ui .expand-operation svg, .swagger-ui .model-toggle:after { filter:invert(.85); }
</style>
</head>
<body>
<div id="swagger-ui"></div>
<script src="/docs/swagger-ui-bundle.js"></script>
<script src="/docs/swagger-ui-standalone-preset.js"></script>
<script>
  window.onload = function () {
    window.ui = SwaggerUIBundle({
      url: "/openapi.yaml",
      dom_id: "#swagger-ui",
      deepLinking: true,
      docExpansion: "list",
      defaultModelsExpandDepth: 0,
      tryItOutEnabled: true,
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
      layout: "BaseLayout"
    });
  };
</script>
</body>
</html>
